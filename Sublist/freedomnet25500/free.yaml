proxy-groups:
  - name: نوع انتخاب پروکسی 🔀
    icon: https://www.svgrepo.com/show/412721/choose.svg
    type: select
    proxies:
      - خودکار (بهترین پینگ) 🤖
      - دستی 🤏🏻
      - پشتیبان (در صورت قطعی) 🧯
      - اتصال پایدار 🔗
      - توزیع بار (پایدار) 🧲
      - توزیع بار (موقت) ⏳
      - توزیع بار (گردشی) 🔁
      - قطع اینترنت ⛔
      - بدون فیلترشکن 🛡️
  - name: دستی 🤏🏻
    type: select
    icon: https://www.svgrepo.com/show/372331/cursor-hand-click.svg
    use:
      - proxy
  - name: خودکار (بهترین پینگ) 🤖
    type: url-test
    icon: https://www.svgrepo.com/show/7876/speedometer.svg
    url: 'https://www.gstatic.com/generate_204' # استفاده از یو‌آر‌ال سبک‌تر و پایدارتر
    interval: 25 # کاهش شدید زمان تست (هر ۲۵ ثانیه) برای کشف سریع قطعی‌ها
    tolerance: 20 # حساسیت بالا (۲۰ میلی‌ثانیه)؛ اگر پینگ کمی خراب شد، سریع سوییچ کند
    timeout: 1200 # اگر پروکسی در ۱.۲ ثانیه وصل نشد، معطلش نکن و مرده فرضش کن
    lazy: false # بسیار مهم: تست‌ها باید همیشه در پس‌زمینه انجام شوند تا پروکسیِ آماده داشته باشی
    max-failed-times: 2 # بعد از ۲ بار خطا، سریعاً تست اجباری انجام دهد
    use:
      - proxy
  - name: پشتیبان (در صورت قطعی) 🧯
    type: fallback
    icon: https://www.svgrepo.com/show/415208/backup-cloud-document.svg
    url: https://www.gstatic.com/generate_204
    interval: 600
    timeout: 6000
    tolerance: 300
    max-failed-times: 3
    lazy: true
    use:
      - proxy
  - name: اتصال پایدار 🔗
    type: url-test
    icon: https://www.svgrepo.com/show/428774/connection-internet-communication.svg
    url: https://cp.cloudflare.com/generate_204
    interval: 30
    timeout: 3000
    tolerance: 200
    max-failed-times: 3
    lazy: true
    proxies:
      - خودکار (بهترین پینگ) 🤖
      - پشتیبان (در صورت قطعی) 🧯
      - دستی 🤏🏻
  - name: توزیع بار (پایدار) 🧲
    type: load-balance
    icon: https://www.svgrepo.com/show/331731/load-balancer-generic.svg
    url: https://api.v2fly.org/checkConnection.svgz
    strategy: consistent-hashing
    interval: 600
    timeout: 6000
    max-failed-times: 5
    lazy: true
    use:
      - proxy
  - name: توزیع بار (گردشی) 🔁
    type: load-balance
    icon: https://www.svgrepo.com/show/388466/rotating-forward.svg
    url: https://api.v2fly.org/checkConnection.svgz
    strategy: round-robin
    url: 'https://www.gstatic.com/generate_204'
    interval: 30
    timeout: 1500
    lazy: false
    use:
      - proxy
  - name: توزیع بار (موقت) ⏳
    type: load-balance
    icon: https://www.svgrepo.com/show/323449/temporary-shield.svg
    url: https://api.v2fly.org/checkConnection.svgz
    strategy: sticky-sessions
    interval: 600
    timeout: 6000
    max-failed-times: 5
    lazy: true
    use:
      - proxy
  - name: المنت 💬
    type: select
    icon: https://www.svgrepo.com/show/353655/matrix-icon.svg
    proxies:
      - بدون فیلترشکن 🛡️
