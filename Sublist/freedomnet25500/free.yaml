global-client-fingerprint: chrome
keep-alive-interval: 5    # تست کانکشن هر ۵ ثانیه برای کشف سریع قطعی‌ها
keep-alive-idle: 10       # شروع بررسی بعد از ۱۰ ثانیه بی‌تحرکی کانکشن
disable-keep-alive: false # حتماً روشن باشد تا کانکشن‌ها در ایران فریز نشوند
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
tcp-concurrent: true      # تست هم‌زمان چند مسیر برای اتصال سریع‌تر
enable-process: true
find-process-mode: always
ipv6: false               # خاموش به دلیل اختلال شدید در ایران
log-level: info           # بهینه برای کاهش مصرف باتری و پردازنده
geo-auto-update: true
geo-update-interval: 168
secret: ''
bind-address: '*'

profile:
  store-selected: true
  store-fake-ip: true

# ==========================================
# ۲. تنظیمات پیشرفته و ضد فیلترینگ DNS
# ==========================================
dns:
  enable: true
  ipv6: false             # غیرفعال‌سازی برای جلوگیری از تایم‌اوت
  prefer-h3: false        # غیرفعال‌سازی HTTP/3 به دلیل فیلترینگ شدید روی پروتکل کوئیک
  cache-algorithm: arc
  use-system-hosts: true
  use-host: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - '*.home.arpa'
    - 'time.*.com'
    - 'ntp.*.com'
    - '*.ir'

  # دی‌ان‌اس‌های اولیه برای پیدا کردن آدرس سرورها
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9

  # دی‌ان‌اس‌های اصلی (اجبار به TCP برای فرار از دراپ شدن UDP)
  nameserver:
    - tcp://1.1.1.1
    - tcp://1.0.0.1
    - tcp://8.8.8.8
    - tcp://8.8.4.4
    - tcp://9.9.9.9
    - tcp://149.112.112.112
    - tcp://208.67.222.222
    - tcp://208.67.220.222

  # شبکه عظیم دی‌ان‌اس بکاپ شما (تغییر یافته به TCP جهت پایداری ۱۰۰٪ در ایران)
  fallback:
    - tcp://76.76.19.19
    - tcp://76.223.122.150
    - tcp://185.228.168.9
    - tcp://185.228.169.9
    - tcp://8.26.56.26
    - tcp://8.20.247.20
    - tcp://76.76.2.11
    - tcp://76.76.10.11
    - tcp://84.200.69.80
    - tcp://84.200.70.40
    - tcp://45.33.97.5
    - tcp://37.235.1.177
    - tcp://209.244.0.3
    - tcp://209.244.0.4
    - tcp://156.154.70.5
    - tcp://156.154.71.5
    - tcp://103.86.96.100
    - tcp://103.86.99.100
    - tcp://199.85.126.10
    - tcp://199.85.127.10
    - tcp://129.250.35.250
    - tcp://129.250.35.251
    - tcp://94.16.114.254
    - tcp://94.247.43.254
    - tcp://208.67.222.20
    - tcp://195.46.39.39
    - tcp://195.46.39.40
    - tcp://204.117.214.10
    - tcp://199.2.252.10
    - tcp://194.169.169.169
    - tcp://156.154.70.1
    - tcp://156.154.71.1
    - tcp://91.239.100.100
    - tcp://89.233.43.71
    - tcp://64.6.64.6
    - tcp://64.6.65.6
    - tcp://77.88.8.8
    - tcp://77.88.8.1

  # فیلتر هوشمند برای سوئیچ آنی به بکاپ‌ها در صورت آلودگی دی‌ان‌اس در ایران
  fallback-filter:
    geoip: true
    geoip-code: IR # تشخیص آی‌پی‌های فیک فیلترینگ ایران و سوئیچ به بکاپ
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'

  # دی‌ان‌اس اختصاصی برای حل آدرس سرورهای خود پروکسی
  proxy-server-nameserver:
    - tcp://1.1.1.1
    - tcp://8.8.8.8

  direct-nameserver:
    - '78.157.42.100'
    - '78.157.42.101' 

# ==========================================
# ۳. سیستم اسنیفر (Sniffer)
# ==========================================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]

# ==========================================
# ۴. تنظیمات تونل شبکه (TUN)
# ==========================================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  auto-redir: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"

